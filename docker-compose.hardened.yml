# Hardening overlay. Bring the stack up with:
#   make harden-up        (recommended — creates data dirs + checks the LUKS mount)
# or, equivalently:
#   DATA_DIR=/abs/path mkdir -p $DATA_DIR/postgres $DATA_DIR/n8n \
#     && docker compose -f docker-compose.yml -f docker-compose.hardened.yml up -d
#
# What it changes:
#  - Secrets come from files in ./secrets/* (mounted at /run/secrets), NOT env.
#    Use a SECRET-FREE .env in this mode (cp .env.hardened.example .env) so no
#    secret is injected via env_file and so the worker's pydantic secrets_dir
#    (env always outranks secret files) is actually used.
#  - Plaintext password keys inherited from the base file are blanked here so
#    Postgres/n8n use the *_FILE values and nothing leaks into `docker inspect`.
#  - no-new-privileges on all; worker runs cap-dropped + read-only rootfs.
#  - Data volumes bind to ${DATA_DIR} (point it at a LUKS mount — ABSOLUTE path).
#
# NOTE: none of this protects you from a user with ROOT / docker-group access on
# the host — they can still read container memory and the docker socket. For that
# you need your own VM/VPS or a confidential-computing VM. See docs/SECURITY.md.

secrets:
  db_password:             { file: ./secrets/db_password }
  openai_key_a:            { file: ./secrets/openai_key_a }
  openai_key_b:            { file: ./secrets/openai_key_b }
  notion_token:            { file: ./secrets/notion_token }
  scrapingdog_key:         { file: ./secrets/scrapingdog_key }
  telegram_bot_token:      { file: ./secrets/telegram_bot_token }
  n8n_encryption_key:      { file: ./secrets/n8n_encryption_key }
  n8n_basic_auth_password: { file: ./secrets/n8n_basic_auth_password }

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ""        # blank the base value; postgres treats empty as unset and uses _FILE
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets: [db_password]
    security_opt: ["no-new-privileges:true"]

  worker:
    # Build the DSN from parts so the DB password comes from the secret file.
    # HOME/PYTHONDONTWRITEBYTECODE keep a read-only rootfs happy.
    environment:
      DATABASE_URL: ""
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER:-n8n}
      DB_NAME: ${POSTGRES_DB:-n8n}
      HOME: /tmp
      PYTHONDONTWRITEBYTECODE: "1"
    secrets:
      - db_password
      - openai_key_a
      - openai_key_b
      - notion_token
      - scrapingdog_key
      - telegram_bot_token
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs:
      - /tmp

  n8n:
    environment:
      # null (NOT "") unsets the base plaintext key entirely. Unlike Postgres's
      # bash entrypoint (which treats "" as falsy and falls back to _FILE), n8n's
      # own _FILE reader treats an explicitly-set "" as "already provided" and
      # never reads the file -> n8n boots with an empty DB password and crash-loops
      # (SASL "client password must be a string"); an empty basic-auth password
      # would be a silent auth bypass. null removes the key so only _FILE applies.
      DB_POSTGRESDB_PASSWORD: null
      DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/db_password
      N8N_ENCRYPTION_KEY_FILE: /run/secrets/n8n_encryption_key
      N8N_BASIC_AUTH_PASSWORD: null
      N8N_BASIC_AUTH_PASSWORD_FILE: /run/secrets/n8n_basic_auth_password
    secrets:
      - db_password
      - n8n_encryption_key
      - n8n_basic_auth_password
    security_opt: ["no-new-privileges:true"]

# Data volumes bind to ${DATA_DIR} (set it to an ABSOLUTE path; a LUKS mount for
# encryption at rest). `make harden-up` creates the subdirs and refuses to start
# on an unmounted LUKS path. IMPORTANT: a named volume caches its device binding
# on first creation — if you change DATA_DIR later you must `make harden-reset`
# (destroys the volumes) so they rebind. So set DATA_DIR / run luks-open BEFORE
# the first harden-up.
volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/postgres
  n8n-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/n8n
